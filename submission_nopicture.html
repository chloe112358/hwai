<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>王敏軒｜數位名片</title>
    <meta name="description" content="王敏軒的個人數位名片（Notion 風格 + 河狸驚喜）" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --bg: #fbfbfa;
        --paper: rgba(255,255,255,0.78);
        --card: #f5e7d6;
        --card2: #f1dcc4;
        --ink: rgba(35,24,16,0.92);
        --inkMuted: rgba(35,24,16,0.62);
        --border: rgba(15,15,15,0.10);
        --text: rgba(15,15,15,0.92);
        --muted: rgba(15,15,15,0.60);
        --shadow: 0 18px 60px rgba(15, 15, 15, 0.08);
        --ig: #d9467a;
        --email: #2f6feb;
        --github: #16a34a;
      }

      *{ box-sizing: border-box; }
      html, body{ height: 100%; }
      body{
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: Inter, "Noto Sans TC", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .bg{
        position: fixed;
        inset: 0;
        background:
          radial-gradient(1200px 800px at 18% 18%, rgba(47,111,235,0.10), transparent 60%),
          radial-gradient(1100px 700px at 82% 22%, rgba(255,77,141,0.10), transparent 62%),
          radial-gradient(900px 700px at 60% 86%, rgba(18,185,129,0.10), transparent 58%),
          linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0.15)),
          var(--bg);
        transition: background 420ms ease;
        cursor: pointer;
      }

      .wallpaper.isDam::before{
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.55;
        background:
          repeating-linear-gradient(0deg, rgba(35,24,16,0.06) 0px, rgba(35,24,16,0.06) 1px, transparent 1px, transparent 22px),
          repeating-linear-gradient(90deg, rgba(35,24,16,0.05) 0px, rgba(35,24,16,0.05) 1px, transparent 1px, transparent 26px),
          repeating-linear-gradient(45deg, rgba(35,24,16,0.025) 0px, rgba(35,24,16,0.025) 1px, transparent 1px, transparent 34px);
        mask-image: radial-gradient(closest-side at 50% 40%, rgba(0,0,0,0.95), transparent 82%);
      }

      .wallpaper{
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.9;
        filter: saturate(0.98);
      }

      .wallpaper .wBeaver{
        position: absolute;
        width: 28px;
        height: 28px;
        opacity: var(--o);
        transform: translate(-50%, -50%) rotate(var(--r)) scale(var(--s));
        filter: drop-shadow(0 10px 14px rgba(15,15,15,0.10));
        user-select: none;
      }

      .page{
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 44px 20px;
        position: relative;
        pointer-events: none;
      }

      .card{
        width: min(560px, 100%);
        padding: 34px 28px 28px;
        border: 1px solid rgba(35,24,16,0.14);
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.10)),
          linear-gradient(180deg, var(--card), var(--card2));
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        text-align: center;
        pointer-events: auto;
        position: relative;
        overflow: hidden;
      }

      .cardFx{
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        background:
          radial-gradient(700px 360px at 20% 15%, rgba(255,255,255,0.35), transparent 62%),
          radial-gradient(520px 300px at 82% 18%, rgba(255,255,255,0.22), transparent 60%),
          radial-gradient(420px 240px at 64% 88%, rgba(255,255,255,0.18), transparent 58%);
        transition: opacity 260ms ease;
      }

      .card.isSurprise .cardFx{ opacity: 1; }

      .peek{
        position: absolute;
        left: var(--mx, 85%);
        top: var(--my, 82%);
        width: 64px;
        height: 64px;
        opacity: 0.0;
        transform: translate(-50%, -50%) rotate(-10deg);
        transition: opacity 220ms ease;
        pointer-events: none;
      }
      .card.isSurprise .peek{ opacity: 0.85; }
      .peek img{
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 18px 26px rgba(15,15,15,0.16));
      }

      .avatar{
        width: 152px;
        height: 152px;
        margin: 0 auto 16px;
        border-radius: 999px;
        border: 1px solid rgba(35,24,16,0.16);
        background: linear-gradient(180deg, rgba(255,255,255,0.38), rgba(255,255,255,0.14));
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .avatar img{
        width: 86%;
        height: 86%;
        object-fit: contain;
        user-select: none;
        filter: drop-shadow(0 12px 20px rgba(15,15,15,0.12));
      }

      .name{
        margin: 0;
        font-size: 32px;
        line-height: 1.15;
        letter-spacing: -0.02em;
      }

      .subtitle{
        margin: 10px 0 18px;
        font-size: 15px;
        line-height: 1.65;
        color: var(--inkMuted);
      }

      .em{
        font-weight: 700;
        color: rgba(35,24,16,0.90);
        padding: 0 1px;
        position: relative;
      }
      .em::after{
        content: "";
        position: absolute;
        left: -2px;
        right: -2px;
        bottom: 0.10em;
        height: 0.62em;
        border-radius: 10px;
        transform: rotate(-0.6deg);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.00)),
          linear-gradient(90deg, rgba(35,24,16,0.10), rgba(35,24,16,0.04));
        z-index: -1;
        opacity: 0.65;
      }
      .emBeaver{ text-shadow: 0 1px 0 rgba(255,255,255,0.22); }
      .emSchool{ text-shadow: 0 1px 0 rgba(255,255,255,0.22); }
      .emBeaver::after{
        background:
          linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.00)),
          linear-gradient(90deg, rgba(217,70,122,0.22), rgba(217,70,122,0.08));
        opacity: 0.72;
      }
      .emSchool::after{
        background:
          linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.00)),
          linear-gradient(90deg, rgba(47,111,235,0.22), rgba(47,111,235,0.08));
        opacity: 0.72;
      }

      .links{
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 10px;
      }

      .btn{
        display: grid;
        grid-template-columns: 28px 1fr;
        align-items: center;
        gap: 10px;
        padding: 14px 14px;
        border-radius: 14px;
        border: 1px solid rgba(35,24,16,0.14);
        background: rgba(255,255,255,0.22);
        color: rgba(35,24,16,0.90);
        text-decoration: none;
        transition: transform 140ms ease, background 180ms ease, border-color 180ms ease, box-shadow 180ms ease, filter 180ms ease;
        user-select: none;
      }

      .btn:hover{
        transform: translateY(-1px);
        box-shadow: 0 10px 24px rgba(15,15,15,0.08);
        border-color: rgba(15,15,15,0.18);
      }
      .btn:active{ transform: translateY(0px) scale(0.99); }
      .btnLabel{
        font-weight: 700;
        letter-spacing: -0.01em;
        justify-self: start;
      }
      .btnIcon{
        width: 28px;
        height: 28px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        font-weight: 800;
        background: rgba(255,255,255,0.30);
        border: 1px solid rgba(35,24,16,0.12);
      }
      .btn[data-kind="ig"] .btnIcon{ color: var(--ig); }
      .btn[data-kind="email"] .btnIcon{ color: var(--email); }
      .btn[data-kind="github"] .btnIcon{ color: var(--github); }

      .btn.isDone{ filter: saturate(1.04); }
      .btn.isDone[data-kind="ig"]{ border-color: rgba(217,70,122,0.40); background: rgba(217,70,122,0.10); }
      .btn.isDone[data-kind="email"]{ border-color: rgba(47,111,235,0.38); background: rgba(47,111,235,0.10); }
      .btn.isDone[data-kind="github"]{ border-color: rgba(22,163,74,0.36); background: rgba(22,163,74,0.10); }

      .tip{
        margin: 16px 0 0;
        font-size: 12px;
        color: rgba(35,24,16,0.54);
      }

      .toast{
        position: fixed;
        left: var(--tx, 50%);
        top: var(--ty, 50%);
        transform: translateX(-50%) translateY(6px);
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(35,24,16,0.14);
        background: rgba(255,255,255,0.72);
        box-shadow: 0 16px 36px rgba(15,15,15,0.10);
        color: rgba(35,24,16,0.86);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
        font-size: 13px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .toast.isShow{
        opacity: 1;
        transform: translateX(-50%) translateY(0px);
      }

      .sticker{
        position: fixed;
        width: 46px;
        height: 46px;
        pointer-events: none;
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.92) rotate(0deg);
        filter: drop-shadow(0 12px 18px rgba(15,15,15,0.14));
        animation: popFly 900ms cubic-bezier(.2,.9,.2,1) forwards;
        will-change: transform, opacity;
      }
      @keyframes popFly{
        0%{ opacity: 0; transform: translate(-50%, -50%) scale(0.86) rotate(var(--r)); }
        12%{ opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(calc(var(--r) * 0.7)); }
        100%{ opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.96) rotate(calc(var(--r) * 1.6)); }
      }

      @media (max-width: 520px){
        .links{ grid-template-columns: 1fr; }
        .card{ padding: 30px 18px 22px; }
        .name{ font-size: 30px; }
      }
    </style>
  </head>
  <body>
    <div class="bg" id="bg" aria-hidden="true">
      <div class="wallpaper" id="wallpaper" aria-hidden="true"></div>
    </div>

    <main class="page" id="page">
      <section class="card" id="card" aria-label="個人數位名片">
        <div class="cardFx" aria-hidden="true"></div>
        <div class="peek" id="peek" aria-hidden="true">
          <img id="peekImg" alt="" draggable="false" />
        </div>

        <div class="avatar" aria-label="大頭照佔位符">
          <img id="avatarImg" alt="河狸貼紙" draggable="false" />
        </div>

        <h1 class="name">王敏軒</h1>
        <p class="subtitle">
          我是熱愛<span class="em emBeaver">河狸</span>的<span class="em emSchool">陽明交通研究所</span>學生
        </p>

        <div class="links" aria-label="社群連結">
          <a class="btn" href="#" data-kind="ig" aria-label="Instagram（點擊互動示意）">
            <span class="btnIcon" aria-hidden="true">◎</span>
            <span class="btnLabel">IG</span>
          </a>
          <a class="btn" href="#" data-kind="email" aria-label="Email（點擊互動示意）">
            <span class="btnIcon" aria-hidden="true">✉</span>
            <span class="btnLabel">Email</span>
          </a>
          <a class="btn" href="#" data-kind="github" aria-label="GitHub（點擊互動示意）">
            <span class="btnIcon" aria-hidden="true">⌂</span>
            <span class="btnLabel">GitHub</span>
          </a>
        </div>

        <p class="tip" id="tip">點背景換河狸壁紙；點名片有小驚喜。</p>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script>
      const bgEl = document.getElementById("bg");
      const pageEl = document.getElementById("page");
      const tipEl = document.getElementById("tip");
      const wallpaperEl = document.getElementById("wallpaper");
      const cardEl = document.getElementById("card");
      const toastEl = document.getElementById("toast");

      const themes = [
        { bg: "#fbfbfa", a1: "rgba(47,111,235,0.11)", a2: "rgba(255,77,141,0.10)", a3: "rgba(18,185,129,0.10)" },
        { bg: "#fbfaf6", a1: "rgba(244,63,94,0.10)", a2: "rgba(245,158,11,0.12)", a3: "rgba(34,197,94,0.09)" },
        { bg: "#f7fbff", a1: "rgba(59,130,246,0.12)", a2: "rgba(99,102,241,0.10)", a3: "rgba(20,184,166,0.10)" },
        { bg: "#fcf7ff", a1: "rgba(168,85,247,0.12)", a2: "rgba(236,72,153,0.10)", a3: "rgba(99,102,241,0.10)" },
        { bg: "#f6fbf7", a1: "rgba(16,185,129,0.12)", a2: "rgba(34,197,94,0.11)", a3: "rgba(245,158,11,0.10)" },
      ];

      let lastThemeIdx = -1;
      let toastTimer = null;
      let wallpaperModeIdx = 0;

      const wallpaperModes = [
        { id: "sparse", label: "稀疏散落" },
        { id: "corners", label: "角落偷看" },
        { id: "diagonal", label: "對角線隊列" },
        { id: "dam", label: "小水壩紋理" },
      ];

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      function pickTheme() {
        if (themes.length <= 1) return themes[0];
        let idx = Math.floor(Math.random() * themes.length);
        if (idx === lastThemeIdx) idx = (idx + 1) % themes.length;
        lastThemeIdx = idx;
        return themes[idx];
      }

      function setBackgroundTheme(theme) {
        document.documentElement.style.setProperty("--bg", theme.bg);
        bgEl.style.background = `
          radial-gradient(1200px 800px at 18% 18%, ${theme.a1}, transparent 60%),
          radial-gradient(1100px 700px at 82% 22%, ${theme.a2}, transparent 62%),
          radial-gradient(900px 700px at 60% 86%, ${theme.a3}, transparent 58%),
          linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0.15)),
          ${theme.bg}
        `;
      }

      function spawnStickers(x, y) {
        const count = Math.floor(rand(14, 22));
        for (let i = 0; i < count; i++) {
          const img = document.createElement("img");
          img.className = "sticker";
          img.alt = "";
          img.src = BEAVER_SRC;

          const size = rand(22, 52);
          img.style.width = `${size}px`;
          img.style.height = `${size}px`;
          img.style.left = `${x}px`;
          img.style.top = `${y}px`;

          const dx = `${rand(-220, 220).toFixed(1)}px`;
          const dy = `${rand(-280, -70).toFixed(1)}px`;
          const r = `${rand(-28, 28).toFixed(1)}deg`;
          img.style.setProperty("--dx", dx);
          img.style.setProperty("--dy", dy);
          img.style.setProperty("--r", r);
          img.style.animationDuration = `${rand(760, 1120).toFixed(0)}ms`;
          img.style.animationDelay = `${rand(0, 120).toFixed(0)}ms`;

          document.body.appendChild(img);
          window.setTimeout(() => img.remove(), 1600);
        }
      }

      function clearWallpaper() {
        if (!wallpaperEl) return;
        wallpaperEl.innerHTML = "";
      }

      function setWallpaperMode(modeId) {
        if (!wallpaperEl) return;
        wallpaperEl.classList.toggle("isDam", modeId === "dam");
        wallpaperEl.dataset.mode = modeId;
      }

      function addWallpaperBeaver({ xPct, yPct, rDeg, s, o, size }) {
        if (!wallpaperEl) return;
        const img = document.createElement("img");
        img.className = "wBeaver";
        img.alt = "";
        img.src = BEAVER_SRC;
        img.draggable = false;

        img.style.left = `${xPct}%`;
        img.style.top = `${yPct}%`;
        img.style.setProperty("--r", `${rDeg.toFixed(1)}deg`);
        img.style.setProperty("--s", s.toFixed(2));
        img.style.setProperty("--o", o.toFixed(2));
        img.style.width = `${size.toFixed(1)}px`;
        img.style.height = `${size.toFixed(1)}px`;
        wallpaperEl.appendChild(img);
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function generateWallpaper(modeId = "sparse") {
        if (!wallpaperEl) return;
        clearWallpaper();
        setWallpaperMode(modeId);

        if (modeId === "sparse") {
          const count = Math.floor(rand(16, 26));
          for (let i = 0; i < count; i++) {
            addWallpaperBeaver({
              xPct: rand(6, 94),
              yPct: rand(6, 94),
              rDeg: rand(-18, 18),
              s: rand(0.62, 1.02),
              o: rand(0.06, 0.13),
              size: rand(22, 34),
            });
          }
          return;
        }

        if (modeId === "corners") {
          const corners = [
            { x: 12, y: 14 },
            { x: 88, y: 14 },
            { x: 12, y: 88 },
            { x: 88, y: 88 },
          ];
          for (const c of corners) {
            const n = Math.floor(rand(2, 4));
            for (let i = 0; i < n; i++) {
              addWallpaperBeaver({
                xPct: clamp(c.x + rand(-7, 7), 5, 95),
                yPct: clamp(c.y + rand(-7, 7), 5, 95),
                rDeg: rand(-16, 16),
                s: rand(0.62, 0.95),
                o: rand(0.07, 0.14),
                size: rand(22, 34),
              });
            }
          }
          const extras = Math.floor(rand(4, 7));
          for (let i = 0; i < extras; i++) {
            addWallpaperBeaver({
              xPct: rand(8, 92),
              yPct: rand(10, 90),
              rDeg: rand(-18, 18),
              s: rand(0.60, 0.92),
              o: rand(0.03, 0.07),
              size: rand(20, 30),
            });
          }
          return;
        }

        if (modeId === "diagonal") {
          const lanes = Math.floor(rand(3, 5));
          for (let lane = 0; lane < lanes; lane++) {
            const offset = rand(-18, 18) + lane * rand(10, 16);
            const n = Math.floor(rand(6, 9));
            for (let i = 0; i < n; i++) {
              const t = i / (n - 1);
              const x = 10 + t * 80;
              const y = 18 + t * 70 + offset;
              addWallpaperBeaver({
                xPct: clamp(x + rand(-2.6, 2.6), 5, 95),
                yPct: clamp(y + rand(-2.6, 2.6), 5, 95),
                rDeg: rand(-10, 10),
                s: rand(0.58, 0.86),
                o: rand(0.05, 0.11),
                size: rand(20, 32),
              });
            }
          }
          return;
        }

        const count = Math.floor(rand(12, 18));
        for (let i = 0; i < count; i++) {
          addWallpaperBeaver({
            xPct: rand(7, 93),
            yPct: rand(7, 93),
            rDeg: rand(-14, 14),
            s: rand(0.55, 0.90),
            o: rand(0.05, 0.12),
            size: rand(18, 30),
          });
        }
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (err) {
          try {
            const ta = document.createElement("textarea");
            ta.value = text;
            ta.setAttribute("readonly", "");
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            const ok = document.execCommand("copy");
            ta.remove();
            return ok;
          } catch (err) {
            return false;
          }
        }
      }

      function showToast(message) {
        if (!toastEl) return;
        if (cardEl) {
          const rect = cardEl.getBoundingClientRect();
          const x = rect.left + rect.width / 2;
          const y = rect.top + rect.height + 14;
          document.documentElement.style.setProperty("--tx", `${x}px`);
          document.documentElement.style.setProperty("--ty", `${y}px`);
        }
        toastEl.textContent = message;
        toastEl.classList.add("isShow");
        if (toastTimer) window.clearTimeout(toastTimer);
        toastTimer = window.setTimeout(() => toastEl.classList.remove("isShow"), 700);
      }

      function isInsideCard(target) {
        const card = document.querySelector(".card");
        return !!(card && card.contains(target));
      }

      function setTip(text) {
        if (!tipEl) return;
        tipEl.textContent = text;
      }

      // Set initial avatar/peek images and wallpaper.
      document.getElementById("avatarImg").src = BEAVER_SRC;
      document.getElementById("peekImg").src = BEAVER_SRC;
      generateWallpaper("sparse");

      // Buttons: copy demo text + toast.
      document.querySelectorAll(".btn").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.preventDefault();
          const kind = btn.dataset.kind;
          const payloadMap = {
            ig: "IG：@your_handle (demo)",
            email: "Email：you@example.com (demo)",
            github: "GitHub：github.com/yourname (demo)",
          };
          const ok = await copyText(payloadMap[kind] != null ? payloadMap[kind] : "demo");
          btn.classList.add("isDone");
          window.setTimeout(() => btn.classList.remove("isDone"), 750);
          showToast(ok ? "已複製" : "已觸發互動");
        });
      });

      // Background surprise: rotate wallpaper mode + burst beavers.
      bgEl.addEventListener("click", (e) => {
        if (isInsideCard(e.target)) return;
        const theme = pickTheme();
        setBackgroundTheme(theme);
        wallpaperModeIdx = (wallpaperModeIdx + 1) % wallpaperModes.length;
        const mode = wallpaperModes[wallpaperModeIdx];
        generateWallpaper(mode.id);
        spawnStickers(e.clientX, e.clientY);
        setTip("點背景換河狸壁紙；點名片有小驚喜。");
      });

      // Also allow clicking anywhere outside the card (mobile friendly).
      pageEl.addEventListener("click", (e) => {
        if (isInsideCard(e.target)) return;
        const theme = pickTheme();
        setBackgroundTheme(theme);
        wallpaperModeIdx = (wallpaperModeIdx + 1) % wallpaperModes.length;
        const mode = wallpaperModes[wallpaperModeIdx];
        generateWallpaper(mode.id);
        const sx = e.clientX != null ? e.clientX : window.innerWidth / 2;
        const sy = e.clientY != null ? e.clientY : window.innerHeight / 2;
        spawnStickers(sx, sy);
        setTip("點背景換河狸壁紙；點名片有小驚喜。");
      });

      // Card surprise toggle.
      if (cardEl) {
        cardEl.addEventListener("click", (e) => {
          const target = e.target;
          if (target && target.closest && target.closest(".btn")) return;
          cardEl.classList.toggle("isSurprise");
          showToast(cardEl.classList.contains("isSurprise") ? "河狸開始跟著你了" : "河狸先躲起來了");
        });
      }

      function updatePeekByEvent(e) {
        if (!cardEl) return;
        const rect = cardEl.getBoundingClientRect();
        const px = e.clientX - rect.left;
        const py = e.clientY - rect.top;
        const x = clamp(px, 26, rect.width - 26);
        const y = clamp(py, 26, rect.height - 26);
        cardEl.style.setProperty("--mx", `${x}px`);
        cardEl.style.setProperty("--my", `${y}px`);
      }

      window.addEventListener("mousemove", (e) => updatePeekByEvent(e));
      window.addEventListener("deviceorientation", (e) => {
        if (!cardEl) return;
        const rect = cardEl.getBoundingClientRect();
        const dx = (e.gamma != null ? e.gamma : 0) / 45;
        const dy = (e.beta != null ? e.beta : 0) / 65;
        const x = rect.width * (0.5 + dx * 0.45);
        const y = rect.height * (0.62 + dy * 0.35);
        cardEl.style.setProperty("--mx", `${clamp(x, 26, rect.width - 26).toFixed(1)}px`);
        cardEl.style.setProperty("--my", `${clamp(y, 26, rect.height - 26).toFixed(1)}px`);
      });

      // Initialize.
      setBackgroundTheme(pickTheme());
      wallpaperModeIdx = 0;
      generateWallpaper(wallpaperModes[wallpaperModeIdx].id);
    </script>
  </body>
</html>
